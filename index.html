<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel NQ/MNQ — Times &amp; Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main>

  <section class="tabela-card tabela-card-full ts-card">
    <h2>Times &amp; Sales</h2>
    <div class="tabela-scroll ts-scroll">
      <table class="tabela-compacta ts-tabela">
        <thead>
          <tr>
            <th>Horário</th>
            <th>Preço</th>
            <th>Quantidade</th>
          </tr>
        </thead>
        <tbody id="tabela-times-sales"></tbody>
      </table>
    </div>
  </section>

  <section class="login-card" id="login-card">
    <h2>Área restrita</h2>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email" autocomplete="username" required />
      <input type="password" id="login-senha" placeholder="Senha" autocomplete="current-password" required />
      <button type="submit">Entrar</button>
      <p class="login-erro" id="login-erro"></p>
    </form>
  </section>

  <section class="tabelas-grid" id="tabelas-grid" hidden>
    <div class="tabelas-topo">
      <div class="cotacao-bloco">
        <p class="cotacao" id="cotacao-atual"></p>
        <p class="atualizado" id="ultima-atualizacao">Carregando dados…</p>
      </div>
      <div class="filtro-periodo" id="filtro-periodo" role="group" aria-label="Filtro de período">
        <button data-periodo="dia">Dia</button>
        <button data-periodo="semana">Semana</button>
        <button data-periodo="mes">Mês</button>
        <button data-periodo="tudo" class="ativo">Tudo</button>
      </div>
      <button id="btn-sair">Sair</button>
    </div>
    <div class="tabela-card tabela-card-full">
      <h2>Registros Operacionais</h2>
      <div class="tabela-scroll">
        <table class="tabela-compacta">
          <thead>
            <tr>
              <th>1ª trava</th>
              <th>2ª trava</th>
              <th>3ª trava</th>
              <th>Operação</th>
              <th>Entrada</th>
              <th>Saída</th>
              <th>Resultado</th>
              <th>Notificação</th>
            </tr>
          </thead>
          <tbody id="tabela-unificada"></tbody>
        </table>
      </div>
    </div>

  </section>

  <section class="cards-grid" id="cards-grid" aria-label="Resumo de performance">
    <!-- preenchido via JS -->
  </section>

  <section class="charts-grid">
    <div class="chart-card">
      <h2>Lucro vs Prejuízo</h2>
      <div class="pizza-wrap">
        <div class="pizza" id="pizza"></div>
        <ul class="legenda" id="pizza-legenda"></ul>
      </div>
    </div>
    <div class="chart-card">
      <h2>Histórico de Resultados</h2>
      <div class="barras" id="barras"></div>
    </div>
  </section>

</main>

<footer>
  <p>Atualiza automaticamente a cada 30s · Dados via Supabase</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
